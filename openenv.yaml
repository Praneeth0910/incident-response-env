title: Incident Response Env
emoji: 🚨
colorFrom: red
colorTo: blue
sdk: docker
pinned: false

env_id: incident-response-env
version: "1.0.0"
author: Praneeth0910
license: MIT
tags:
  - sre
  - incident-response
  - root-cause-analysis
  - microservices
  - reinforcement-learning

description: >
  An OpenEnv-compliant RL environment where LLM agents act as on-call SREs,
  investigating simulated microservice failures to identify root causes under
  time pressure. Features cascading world state, red herrings, multi-tool
  investigation actions, and deterministic grading gated on RCA correctness.

# ── Interface ─────────────────────────────────────────────────────────────

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  grade:
    method: GET
    path: /grade
  tasks:
    method: GET
    path: /tasks
  state:
    method: GET
    path: /state
  health:
    method: GET
    path: /health

# ── Spaces ─────────────────────────────────────────────────────────────────

observation_space:
  type: dict
  fields:
    message:
      type: string
      description: "Observation text for current step"
    step:
      type: integer
    done:
      type: boolean
    alert:
      type: string
      description: "Original incident alert (constant per episode)"
    metrics:
      type: object
      nullable: true
    info:
      type: object
      nullable: true
      description: "Metadata including run_id"

action_space:
  type: discrete
  actions:
    - read_logs
    - check_metrics
    - check_health
    - run_db_query
    - restart_service
    - rollback_deployment
    - declare_rca

reward_range: [0.001, 0.999]

# ── Tasks ──────────────────────────────────────────────────────────────────

tasks:
  task_cpu_spike:
    difficulty: easy
    max_steps: 10
    ideal_steps: 5

  task_disk_full:
    difficulty: easy
    max_steps: 10
    ideal_steps: 4

  task_db_connection_leak:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_redis_memory_eviction:
    difficulty: medium
    max_steps: 15
    ideal_steps: 5

  task_api_rate_limit:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_deadlock_order_service:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_ssl_cert_expired:
    difficulty: medium
    max_steps: 15
    ideal_steps: 4

  task_slow_query_postgres:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_auth_service_500:
    difficulty: medium
    max_steps: 15
    ideal_steps: 5

  task_k8s_pod_crashloop:
    difficulty: medium
    max_steps: 15
    ideal_steps: 5

  task_memory_leak:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_thread_starvation:
    difficulty: medium
    max_steps: 15
    ideal_steps: 6

  task_canary_poison:
    difficulty: hard
    max_steps: 20
    ideal_steps: 5

  task_clock_skew:
    difficulty: hard
    max_steps: 20
    ideal_steps: 6

  task_expert:
    difficulty: expert
    max_steps: 25
    ideal_steps: 12

# ── Baselines ──────────────────────────────────────────────────────────────

baselines:
  - model: Qwen/Qwen2.5-72B-Instruct
    avg_score: 0.52
  - model: random_agent
    avg_score: 0.08