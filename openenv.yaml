name: incident-response-env
version: "1.0.0"
description: >
  Production incident response environment. An LLM agent investigates
  a simulated microservices system, identifies root causes of failures,
  and declares the correct resolution. Models real SRE workflows with
  partial observability, red herrings, and time pressure.

author: "ZenkuIshigami09"
tags: ["openenv", "incident-response", "sre", "rl", "production"]

observation_space:
  type: object
  properties:
    message:
      type: string
      description: Current observation from the environment
    step:
      type: integer
      description: Current step number
    done:
      type: boolean
      description: Whether the episode has ended
    alert:
      type: string
      description: The original incident alert (persists across steps)
    metrics:
      type: object
      nullable: true
      description: Service metrics if check_metrics was called

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - read_logs
        - check_metrics
        - check_health
        - run_db_query
        - restart_service
        - rollback_deployment
        - declare_rca
      description: Type of investigative or corrective action
    target:
      type: string
      description: >
        Service name (api-gateway, auth-service, order-service,
        notification-service, redis-cache, postgres-db)
        or fault type for declare_rca

tasks:
  - id: task_easy
    name: "OOM crash on notification-service"
    difficulty: easy
    max_steps: 10
    description: >
      Notification service crashed due to out-of-memory error.
      Symptoms visible in logs within 2-3 targeted actions.

  - id: task_medium
    name: "Bad deployment cascading failure"
    difficulty: medium
    max_steps: 15
    description: >
      Bad deployment on order-service caused cascading failures.
      Auth service appears affected but is a victim, not the cause.
      Requires correlating deployment events across 3 services.

  - id: task_hard
    name: "Redis pool exhaustion + CPU red herring"
    difficulty: hard
    max_steps: 20
    description: >
      Redis cache connection pool is exhausted causing cascading timeouts.
      Order service has a high CPU spike that is a deliberate red herring.
      Requires DB query to confirm pool exhaustion and resist the distraction.

reward:
  range: (0.01, 0.99)
  dense: true
  description: >
    +0.05 to +0.12 for relevant evidence found;
    +0.005 for redundant action;
    +0.30 for correct intervention (restart/rollback);
    +0.05 for wrong service restarted, +0.01 for wrong service rolled back;
    +0.50 + time bonus + evidence bonus for correct RCA;
    +0.001 for wrong RCA;
    cumulative strictly clamped to [0.01, 0.99].

endpoints:
  reset: /reset
  step: /step
  state: /state
  health: /health
  grade: /grade
  tasks: /tasks